<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maroon - College Enquiry Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <div class="header">
            <h1>Maroon</h1>
            <p>Professional College Enquiry Assistant</p>
        </div>

        <div class="quick-buttons">
            <button onclick="sendQuickQuestion('Tell me about the college')">College Overview</button>
            <button onclick="sendQuickQuestion('Show departments')">Departments</button>
            <button onclick="sendQuickQuestion('Tell me about placements')">Placements</button>
            <button onclick="sendQuickQuestion('Show facilities')">Facilities</button>
            <button onclick="sendQuickQuestion('Contact details')">Contact</button>
        </div>

        <div id="chat-box" class="chat-box">
            <div class="bot-message">
                Welcome. I am Maroon, the college enquiry assistant. How may I help you today?
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your question here...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
